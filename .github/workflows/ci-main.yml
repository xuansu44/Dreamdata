name: ci-main

on:
  push:
    branches: [main]

# 设置 GitHub Pages 部署所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 部署设置
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy --strict src/dreamdata/sdk.py
      - run: uv run mypy --check-untyped-defs --disallow-untyped-defs src/dreamdata

  unit-component-sdk-fuzz:
    runs-on: ubuntu-latest
    services:
      postgres-15:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dreamdata_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test -d dreamdata_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/dreamdata_test
      WORKSPACE_PATH: /tmp/dreamdata_ws
      USER_ID: ci
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run alembic upgrade head
      - run: mkdir -p "$WORKSPACE_PATH"
      - run: uv run pytest tests/unit/ tests/component/ tests/sdk/ tests/fuzz/ -q

  property-and-e2e:
    runs-on: ubuntu-latest
    services:
      postgres-15:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dreamdata_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test -d dreamdata_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/dreamdata_test
      WORKSPACE_PATH: /tmp/dreamdata_ws
      USER_ID: ci
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run alembic upgrade head
      - run: mkdir -p "$WORKSPACE_PATH"
      - run: uv run pytest tests/property/ tests/e2e/ -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run ruff check --config pyproject.toml --select S --extend-ignore S101 .

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run sphinx-build -W docs/source docs/build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  coverage:
    runs-on: ubuntu-latest
    services:
      postgres-15:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dreamdata_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test -d dreamdata_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/dreamdata_test
      WORKSPACE_PATH: /tmp/dreamdata_ws
      USER_ID: ci
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run alembic upgrade head
      - run: mkdir -p "$WORKSPACE_PATH"
      - run: uv run pytest --cov=src/dreamdata --cov-report=xml --cov-report=term
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  build-artifacts:
    runs-on: ubuntu-latest
    needs: [lint-and-types, unit-component-sdk-fuzz, property-and-e2e, security, docs-build]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # GitHub Pages 部署
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [docs-build]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
